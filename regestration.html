<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Portal Registration</title>
    <link rel="stylesheet" href="regestration.css">
</head>

<body>

    <div class="container">
        <form id="registerForm">
            <h2> JobPortal <span class="highlight"> Registration </span></h2>
            <input type="text" id="name" placeholder="Full Name">
            <input type="email" id="email" placeholder="Email Address">
            <input type="tel" id="phone" placeholder="Phone Number">
            <input type="date" id="dob">
            <select id="gender">
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>

            <input type="text" id="qualification" placeholder="Qualification">
            <input type="text" id="skills" placeholder="Skills">
            <input type="file" id="resume" accept=".pdf,.doc,.docx">
            <input type="password" id="password" placeholder="Password">
            <input type="password" id="confirmPassword" placeholder="Confirm Password">
            <label>
                <input type="checkbox" id="terms">
                <span class="white">I agree to the Terms & Conditions</span>
            </label>
            <button type="submit">Register</button>
            <p id="message"></p>
        </form>
    </div>

    <script src="registration.js"></script>

</body>

</html>
